<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Minimal Clock</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕐</text></svg>">
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --idle: 2400ms;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body.idle { cursor: none; }

  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }

  #time {
    font-weight: 500;
    line-height: 1;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
    letter-spacing: -0.01em;
  }

  #time .ampm {
    font-size: 0.32em;
    font-weight: 500;
    margin-left: 0.25em;
    vertical-align: 0.85em;
    letter-spacing: 0.02em;
    opacity: 0.55;
  }

  /* ---- the fade-away control panel ---- */
  #panel {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(8px);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 10px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    pointer-events: none;
    transition: opacity 260ms ease, transform 260ms ease;
    z-index: 10;
    max-width: calc(100vw - 24px);
  }

  body:not(.idle) #panel,
  #panel:focus-within {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }

  #panel label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  /* ---- timezone search ---- */
  #tz-wrap {
    position: relative;
  }

  #tz-input {
    appearance: none;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 10px;
    font: inherit;
    width: 210px;
    cursor: text;
    outline: none;
  }
  #tz-input::placeholder { color: rgba(255,255,255,0.35); }
  #tz-input:focus { border-color: rgba(255,255,255,0.28); }

  #tz-list {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    min-width: 260px;
    background: #1c1c1e;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 12px;
    list-style: none;
    margin: 0;
    padding: 4px;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    z-index: 20;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  #tz-list.open { display: block; }

  #tz-list li {
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  #tz-list li:hover,
  #tz-list li.active {
    background: rgba(255,255,255,0.10);
  }
  #tz-list li .tz-label { font-size: 0.9em; color: #fff; }
  #tz-list li .tz-sub   { font-size: 0.75em; color: rgba(255,255,255,0.40); }

  #tz-list .tz-empty {
    padding: 10px 12px;
    color: rgba(255,255,255,0.35);
    font-size: 0.85em;
    cursor: default;
  }

  .seg {
    display: inline-flex;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
  }
  .seg button {
    background: transparent;
    color: rgba(255,255,255,0.6);
    border: 0;
    padding: 6px 10px;
    font: inherit;
    cursor: pointer;
  }
  .seg button[aria-pressed="true"] { background: rgba(255,255,255,0.16); color: #fff; }

  .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }

  .ghost {
    background: transparent;
    color: rgba(255,255,255,0.55);
    border: 0;
    padding: 6px 6px;
    font: inherit;
    cursor: pointer;
  }
  .ghost:hover { color: #fff; }

  #panel :focus-visible {
    outline: 2px solid rgba(255,255,255,0.7);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    #panel { transition: none; }
  }

  @media (max-width: 560px) {
    #panel { gap: 12px; font-size: 13px; bottom: 18px; }
    .divider { display: none; }
    #tz-input { width: 140px; }
    #tz-list { min-width: 220px; }
  }
</style>
</head>
<body>

        <ul id="tz-list" role="listbox" aria-label="Timezone suggestions"></ul>
      </div>
    </label>
    <div class="divider"></div>
    <div class="seg" role="group" aria-label="Hour format">
      <button id="fmt24" type="button" aria-pressed="true">24h</button>
      <button id="fmt12" type="button" aria-pressed="false">12h</button>
    </div>
    <button id="secBtn" class="ghost" type="button" aria-pressed="true">Seconds: on</button>

  // pre-build search string and lookup map
  var TZ_MAP = {};
  TZ_DB.forEach(function (e) {

    TZ_MAP[e.tz] = e;
  });

  function labelForZone(tz) {
    // prefer a persisted city alias label for the current zone
    if (settings.label && settings.zone === tz) return settings.label;
    if (TZ_MAP[tz]) return TZ_MAP[tz].label;
    return tz.replace(/_/g, " ").replace(/.*\//, "");
  }

  // capitalise a matched word from the cities list
  function titleCase(s) {
    return s.replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }

  // ---- search logic ----
  function searchZones(query) {
    query = query.trim().toLowerCase();
    if (!query) {
      return ["America/New_York","America/Chicago","America/Denver","America/Los_Angeles",
              "Europe/London","Europe/Paris","Europe/Berlin","Asia/Tokyo","Asia/Shanghai",
              "Australia/Sydney","UTC"].map(function (tz) {
        return TZ_MAP[tz] || { tz: tz, label: labelForZone(tz), desc: tz, cities: [], _search: tz };
      });
    }

    var results = [];
    TZ_DB.forEach(function (e) {
      var score = 0;
      var matchedCity = null;

      // check city alias match first — gives the result a context-aware label
      e.cities.forEach(function (city) {
        var cl = city.toLowerCase();
        if (!matchedCity) {
          if (cl === query)             { score = Math.max(score, 110); matchedCity = city; }
          else if (cl.startsWith(query)){ score = Math.max(score, 90);  matchedCity = city; }
          else if (cl.includes(query))  { score = Math.max(score, 65);  matchedCity = city; }
        }
      });

      if (!matchedCity) {
        var lbl = e.label.toLowerCase();
        var tzl = e.tz.toLowerCase().replace(/_/g, " ");
        if (lbl === query || tzl === query)                  { score = 100; }
        else if (lbl.startsWith(query))                      { score = 85; }
        else if (tzl.split("/").pop().startsWith(query))     { score = 80; }
        else if (e._search.split(" ").some(function(w){ return w.startsWith(query); })) { score = 60; }
        else if (e._search.includes(query))                  { score = 40; }
      }

      if (score > 0) results.push({ entry: e, score: score, matchedCity: matchedCity });
    });

    results.sort(function (a, b) { return b.score - a.score; });

    var out = results.map(function (r) {
      var e = r.entry;
      if (r.matchedCity) {
        // show the matched city as the label; clarify it's the same time as the canonical city
        var note = r.matchedCity.toLowerCase() === e.label.toLowerCase()
          ? e.desc
          : e.desc + " · same time as " + e.label;
        return { tz: e.tz, label: titleCase(r.matchedCity), desc: note, _isAlias: true };
      }
      return { tz: e.tz, label: e.label, desc: e.desc };
    });

    // 2. fill with IANA list matches not already in curated set (if fewer than 8 results)
    if (out.length < 8) {
      try {
        var all = (typeof Intl.supportedValuesOf === "function") ? Intl.supportedValuesOf("timeZone") : [];
        var seen = {};
        out.forEach(function (e) { seen[e.tz] = true; });
        all.forEach(function (tz) {
          if (seen[tz]) return;
          if (tz.toLowerCase().replace(/_/g," ").includes(query)) {
            out.push({ tz: tz, label: labelForZone(tz), desc: tz });
            seen[tz] = true;
          }
        });
      } catch (e) {}
    }

    return out.slice(0, 10);
  }

  // ---- dropdown state ----
  var activeIdx = -1;
  var currentResults = [];
  var pendingZone = settings.zone; // zone committed on select

  function showList(results) {
    currentResults = results;
    activeIdx = -1;
    tzList.innerHTML = "";
    if (!results.length) {
      var li = document.createElement("li");
      li.className = "tz-empty";
      li.textContent = "No results";
      tzList.appendChild(li);
      tzList.classList.add("open");
      return;
    }
    results.forEach(function (e, i) {
      var li = document.createElement("li");
      li.setAttribute("role", "option");
      li.setAttribute("data-tz", e.tz);
      var lblEl = document.createElement("span");
      lblEl.className = "tz-label";
      lblEl.textContent = e.label;
      var subEl = document.createElement("span");
      subEl.className = "tz-sub";
      subEl.textContent = e.desc || e.tz;
      li.appendChild(lblEl);
      li.appendChild(subEl);
      li.addEventListener("mousedown", function (ev) {
        ev.preventDefault(); // don't blur input
        selectEntry(e);
      });
      li.addEventListener("mousemove", function () { setActive(i); });
      tzList.appendChild(li);
    });
    tzList.classList.add("open");
  }

  function hideList() {
    tzList.classList.remove("open");
    activeIdx = -1;
  }

  function setActive(idx) {
    var items = tzList.querySelectorAll("li[role='option']");
    items.forEach(function (el, i) { el.classList.toggle("active", i === idx); });
    activeIdx = idx;
  }

  function selectEntry(e) {
    pendingZone = e.tz;
    settings.zone = e.tz;
    settings.label = e.label;
    store.set("clock.zone", e.tz);
    store.set("clock.label", e.label);
    tzInput.value = e.label;
    hideList();
    applyAndStart();
  }

  tzInput.addEventListener("focus", function () {
    tzInput.select();
    showList(searchZones(tzInput.value === labelForZone(settings.zone) ? "" : tzInput.value));
  });

  tzInput.addEventListener("input", function () {
    showList(searchZones(tzInput.value));
  });

  tzInput.addEventListener("blur", function () {
    // restore label if nothing was selected
    setTimeout(function () {
      if (!tzList.classList.contains("open")) return;
      hideList();
      tzInput.value = labelForZone(settings.zone);
    }, 150);
  });

  tzInput.addEventListener("keydown", function (e) {
    var items = tzList.querySelectorAll("li[role='option']");
    if (e.key === "ArrowDown") {
      e.preventDefault();
      setActive(Math.min(activeIdx + 1, items.length - 1));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setActive(Math.max(activeIdx - 1, 0));
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (activeIdx >= 0 && currentResults[activeIdx]) {
        selectEntry(currentResults[activeIdx]);
      } else if (currentResults.length > 0) {
        selectEntry(currentResults[0]);
      }
    } else if (e.key === "Escape") {
      hideList();
      tzInput.value = labelForZone(settings.zone);
      tzInput.blur();
    }
  });

  // close list when clicking outside
  document.addEventListener("mousedown", function (e) {
    if (!document.getElementById("tz-wrap").contains(e.target)) {
      hideList();
      tzInput.value = labelForZone(settings.zone);
    }
  });

  // set initial input label
  tzInput.value = labelForZone(settings.zone);

  // ---- formatter ----
  var formatter;
  function buildFormatter() {
    var opts = { hour: "2-digit", minute: "2-digit", hour12: settings.hour12, hourCycle: settings.hour12 ? "h12" : "h23" };
    if (settings.seconds) opts.second = "2-digit";
    try { opts.timeZone = settings.zone; } catch (e) {}
    try {
      formatter = new Intl.DateTimeFormat([], opts);
    } catch (e) {
      delete opts.timeZone;
      formatter = new Intl.DateTimeFormat([], opts);
    }
  }

  // ---- fit the time to the viewport ----
  var lastLen = -1;
  function fit() {
    timeEl.style.fontSize = "100px";
    var w = timeEl.getBoundingClientRect().width;
    var h = timeEl.getBoundingClientRect().height;
    if (w === 0 || h === 0) return;
    var targetW = window.innerWidth  * 0.63;
    var targetH = window.innerHeight * 0.50;
    var scale = Math.min(targetW / w, targetH / h);
    timeEl.style.fontSize = (100 * scale) + "px";
  }

  function render() {
    var parts;
    try { parts = formatter.formatToParts(new Date()); }
    catch (e) { timeEl.textContent = "--:--"; return; }

    var plain = "";
    var html = "";
    parts.forEach(function (p) {
      plain += p.value;
      if (p.type === "dayPeriod") {
        html += '<span class="ampm">' + p.value.trim() + '</span>';
      } else {
        html += p.value;
      }
    });

    timeEl.innerHTML = html;
    if (plain.length !== lastLen) { lastLen = plain.length; fit(); }
  }

  function tick() {
    render();
    var delay = 1000 - (Date.now() % 1000);
    setTimeout(tick, delay + 5);
  }

  function applyAndStart() {
    buildFormatter();
    lastLen = -1;
    render();
    fit();
  }

  // ---- controls ----
  function setHour12(on) {
    settings.hour12 = on;
    fmt12.setAttribute("aria-pressed", on ? "true" : "false");
    fmt24.setAttribute("aria-pressed", on ? "false" : "true");
    store.set("clock.hour12", on ? "true" : "false");
    applyAndStart();
  }
  fmt12.addEventListener("click", function () { setHour12(true); });
  fmt24.addEventListener("click", function () { setHour12(false); });

  secBtn.addEventListener("click", function () {
    settings.seconds = !settings.seconds;
    secBtn.setAttribute("aria-pressed", settings.seconds ? "true" : "false");
    secBtn.textContent = "Seconds: " + (settings.seconds ? "on" : "off");
    store.set("clock.seconds", settings.seconds ? "true" : "false");
    applyAndStart();
  });

  // reflect saved state into controls
  fmt12.setAttribute("aria-pressed", settings.hour12 ? "true" : "false");
  fmt24.setAttribute("aria-pressed", settings.hour12 ? "false" : "true");
  secBtn.setAttribute("aria-pressed", settings.seconds ? "true" : "false");
  secBtn.textContent = "Seconds: " + (settings.seconds ? "on" : "off");

  // ---- idle fade ----
  var idleMs = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--idle"), 10) || 2400;
  var idleTimer;
  function wake() {
    document.body.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function () { document.body.classList.add("idle"); }, idleMs);
  }
  ["mousemove", "mousedown", "touchstart", "keydown", "wheel"].forEach(function (ev) {
    window.addEventListener(ev, wake, { passive: true });
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") { if (document.activeElement) document.activeElement.blur(); }
  });

  window.addEventListener("resize", fit);
  if (window.visualViewport) window.visualViewport.addEventListener("resize", fit);

  // ---- go ----
  applyAndStart();
  tick();
  wake();
})();
</script>
</body>
</html>
